<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Planned Giving Opportunity Analysis</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Outfit', 'Helvetica Neue', Arial, sans-serif; }
        #chart { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        // Load data from JSON file
        fetch('../data/mortality-model.json')
            .then(response => response.json())
            .then(data => {
                // Generate sample data for planned giving analysis
                // Age vs Capacity scatter plot with bubble sizes for giving history
                
                // Generate random but realistic data points
                const numPoints = 150;
                const ages = [];
                const capacities = [];
                const givingHistory = [];
                const categories = [];
                
                for (let i = 0; i < numPoints; i++) {
                    // Age distribution weighted toward older donors
                    const age = Math.round(Math.random() * 25 + 55); // 55-80
                    ages.push(age);
                    
                    // Capacity correlated with age (older = higher capacity)
                    const baseCapacity = Math.pow(Math.random(), 0.3) * 1000000; // 0-1M
                    const ageMultiplier = 1 + (age - 55) * 0.02; // Older = higher
                    const capacity = Math.round(baseCapacity * ageMultiplier);
                    capacities.push(capacity);
                    
                    // Giving history (bubble size)
                    const giving = Math.round(Math.random() * 50000 + 1000); // $1K-50K
                    givingHistory.push(giving);
                    
                    // Categorize opportunities
                    if (age >= 70 && capacity >= 500000) {
                        categories.push('High Priority');
                    } else if (age >= 65 && capacity >= 200000) {
                        categories.push('Medium Priority');
                    } else {
                        categories.push('Future Prospect');
                    }
                }
                
                // Create separate traces for each category
                const categoryColors = {
                    'High Priority': '#e74c3c',
                    'Medium Priority': '#c4956a',
                    'Future Prospect': '#2a5a8c'
                };
                
                const traces = Object.keys(categoryColors).map(category => {
                    const indices = categories.map((cat, i) => cat === category ? i : -1).filter(i => i >= 0);
                    
                    return {
                        x: indices.map(i => ages[i]),
                        y: indices.map(i => capacities[i]),
                        mode: 'markers',
                        type: 'scatter',
                        name: category,
                        marker: {
                            color: categoryColors[category],
                            size: indices.map(i => Math.sqrt(givingHistory[i] / 1000) + 5), // Scale bubble size
                            sizemode: 'diameter',
                            sizemin: 5,
                            sizemax: 30,
                            line: {
                                color: 'white',
                                width: 1
                            },
                            opacity: 0.7
                        },
                        text: indices.map(i => 
                            `Age: ${ages[i]}<br>Capacity: $${capacities[i].toLocaleString()}<br>Total Giving: $${givingHistory[i].toLocaleString()}`
                        ),
                        hovertemplate: '<b>%{fullData.name}</b><br>%{text}<extra></extra>'
                    };
                });
                
                const layout = {
                    title: {
                        text: 'Planned Giving Opportunity Analysis',
                        font: {size: 24, color: '#2a5a8c', family: 'Outfit, Helvetica Neue, Arial'},
                        x: 0.5,
                        xanchor: 'center'
                    },
                    xaxis: {
                        title: 'Donor Age',
                        showgrid: true,
                        gridwidth: 1,
                        gridcolor: '#E5E5E5',
                        range: [52, 82]
                    },
                    yaxis: {
                        title: 'Estimated Capacity ($)',
                        tickformat: '$,.0f',
                        showgrid: true,
                        gridwidth: 1,
                        gridcolor: '#E5E5E5',
                        type: 'log'
                    },
                    legend: {
                        orientation: 'v',
                        yanchor: 'top',
                        y: 0.98,
                        xanchor: 'left',
                        x: 1.02,
                        bgcolor: 'rgba(255,255,255,0.8)',
                        bordercolor: '#E5E5E5',
                        borderwidth: 1
                    },
                    font: {family: 'Outfit, Helvetica Neue, Arial', size: 12},
                    margin: {t: 100, b: 60, l: 100, r: 140},
                    plot_bgcolor: 'white',
                    paper_bgcolor: 'white',
                    shapes: [
                        {
                            type: 'line',
                            x0: 70,
                            x1: 70,
                            y0: 10000,
                            y1: 2000000,
                            line: {
                                color: '#e74c3c',
                                width: 2,
                                dash: 'dash'
                            }
                        },
                        {
                            type: 'line',
                            x0: 50,
                            x1: 85,
                            y0: 500000,
                            y1: 500000,
                            line: {
                                color: '#e74c3c',
                                width: 2,
                                dash: 'dash'
                            }
                        }
                    ],
                    annotations: [
                        {
                            x: 76,
                            y: 1500000,
                            text: 'Prime planned<br>giving candidates',
                            showarrow: true,
                            arrowhead: 2,
                            arrowcolor: '#e74c3c',
                            bgcolor: 'white',
                            bordercolor: '#e74c3c',
                            borderwidth: 1,
                            borderpad: 4,
                            font: {size: 11}
                        },
                        {
                            x: 0.02,
                            y: -0.15,
                            xref: 'paper',
                            yref: 'paper',
                            text: 'Bubble size represents total giving history',
                            showarrow: false,
                            font: {size: 10, color: '#666'},
                            xanchor: 'left'
                        }
                    ]
                };
                
                const config = {responsive: true, displayModeBar: false};
                
                Plotly.newPlot('chart', traces, layout, config);
            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.getElementById('chart').innerHTML = '<p style="text-align: center; padding: 50px; color: #666;">Error loading chart data</p>';
            });
    </script>
</body>
</html>
