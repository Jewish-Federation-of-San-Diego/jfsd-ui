<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Donor Lifecycle Stage Distribution</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Outfit', 'Helvetica Neue', Arial, sans-serif; }
        #chart { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        // Load data from JSON file
        fetch('../data/donor-lifecycle.json')
            .then(response => response.json())
            .then(data => {
                // Extract lifecycle distribution data
                const stages = data.lifecycleDistribution.map(d => d.stage);
                const counts = data.lifecycleDistribution.map(d => d.count);
                const percentages = data.lifecycleDistribution.map(d => d.percentage);
                
                // Define colors for each stage
                const colors = ['#27ae60', '#2a5a8c', '#c4956a', '#e74c3c', '#f39c12'];
                
                const trace = {
                    x: stages,
                    y: counts,
                    type: 'bar',
                    marker: {
                        color: colors,
                        line: {
                            color: 'white',
                            width: 2
                        }
                    },
                    text: percentages.map(p => `${p}%`),
                    textposition: 'auto',
                    textfont: {size: 14, color: 'white', family: 'Outfit'},
                    hovertemplate: '<b>%{x}</b><br>Count: %{y:,}<br>Percentage: %{text}<extra></extra>'
                };
                
                const layout = {
                    title: {
                        text: 'Donor Lifecycle Stage Distribution',
                        font: {size: 24, color: '#2a5a8c', family: 'Outfit, Helvetica Neue, Arial'},
                        x: 0.5,
                        xanchor: 'center'
                    },
                    xaxis: {
                        title: 'Lifecycle Stage',
                        showgrid: false
                    },
                    yaxis: {
                        title: 'Number of Donors',
                        tickformat: ',',
                        showgrid: true,
                        gridwidth: 1,
                        gridcolor: '#E5E5E5'
                    },
                    font: {family: 'Outfit, Helvetica Neue, Arial', size: 12},
                    margin: {t: 100, b: 80, l: 80, r: 40},
                    plot_bgcolor: 'white',
                    paper_bgcolor: 'white',
                    showlegend: false,
                    annotations: [
                        {
                            x: 'Repeat',
                            y: 6200,
                            text: 'Largest<br>Segment',
                            showarrow: true,
                            arrowhead: 2,
                            arrowcolor: '#2a5a8c',
                            bgcolor: 'white',
                            bordercolor: '#2a5a8c',
                            borderwidth: 1,
                            borderpad: 4,
                            font: {size: 11},
                            ay: -60
                        },
                        {
                            x: 'LYBUNT',
                            y: 2850,
                            text: 'Recovery<br>Opportunity',
                            showarrow: true,
                            arrowhead: 2,
                            arrowcolor: '#e74c3c',
                            bgcolor: 'white',
                            bordercolor: '#e74c3c',
                            borderwidth: 1,
                            borderpad: 4,
                            font: {size: 11},
                            ay: -60
                        }
                    ]
                };
                
                const config = {responsive: true, displayModeBar: false};
                
                Plotly.newPlot('chart', [trace], layout, config);
            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.getElementById('chart').innerHTML = '<p style="text-align: center; padding: 50px; color: #666;">Error loading chart data</p>';
            });
    </script>
</body>
</html>
