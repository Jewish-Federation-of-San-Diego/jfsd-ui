<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Donor Retention Flow</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Outfit', 'Helvetica Neue', Arial, sans-serif; }
        #chart { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script>
        // Load data from JSON file
        fetch('../data/retention-analysis.json')
            .then(response => response.json())
            .then(data => {
                // Sankey diagram showing donor flow
                const trace = {
                    type: "sankey",
                    orientation: "h",
                    node: {
                        pad: 15,
                        thickness: 30,
                        line: {
                            color: "black",
                            width: 0.5
                        },
                        label: [
                            "FY25 Active Donors (15,000)",
                            "FY26 Retained (10,800)",
                            "FY26 LYBUNT (4,200)",
                            "FY26 New Donors (2,800)",
                            "FY26 Total Active (13,600)"
                        ],
                        color: [
                            "#2a5a8c",  // FY25 Active
                            "#c4956a",  // Retained
                            "#e74c3c",  // LYBUNT
                            "#27ae60",  // New
                            "#009191"   // Total
                        ]
                    },
                    link: {
                        source: [0, 0, 3, 1],  // From nodes
                        target: [1, 2, 4, 4],  // To nodes
                        value: [10800, 4200, 2800, 10800],  // Flow values
                        color: [
                            "rgba(196, 149, 106, 0.6)",  // Retained flow
                            "rgba(231, 76, 60, 0.6)",    // LYBUNT flow
                            "rgba(39, 174, 96, 0.6)",    // New donor flow
                            "rgba(196, 149, 106, 0.6)"   // Retained to total flow
                        ]
                    }
                };
                
                const layout = {
                    title: {
                        text: 'Donor Retention Flow Analysis (FY25 → FY26)',
                        font: {size: 24, color: '#2a5a8c', family: 'Outfit, Helvetica Neue, Arial'},
                        x: 0.5,
                        xanchor: 'center'
                    },
                    font: {family: 'Outfit, Helvetica Neue, Arial', size: 14},
                    margin: {t: 100, b: 60, l: 40, r: 40},
                    paper_bgcolor: 'white',
                    annotations: [
                        {
                            x: 0.15,
                            y: 0.85,
                            text: '72% Retention Rate',
                            showarrow: false,
                            font: {size: 16, color: '#c4956a', family: 'Outfit'},
                            bgcolor: 'rgba(255,255,255,0.8)',
                            bordercolor: '#c4956a',
                            borderwidth: 1,
                            borderpad: 4
                        },
                        {
                            x: 0.15,
                            y: 0.15,
                            text: '28% Attrition Rate',
                            showarrow: false,
                            font: {size: 16, color: '#e74c3c', family: 'Outfit'},
                            bgcolor: 'rgba(255,255,255,0.8)',
                            bordercolor: '#e74c3c',
                            borderwidth: 1,
                            borderpad: 4
                        },
                        {
                            x: 0.85,
                            y: 0.5,
                            text: '13,600 Active Donors',
                            showarrow: false,
                            font: {size: 16, color: '#009191', family: 'Outfit'},
                            bgcolor: 'rgba(255,255,255,0.8)',
                            bordercolor: '#009191',
                            borderwidth: 1,
                            borderpad: 4
                        }
                    ]
                };
                
                const config = {responsive: true, displayModeBar: false};
                
                Plotly.newPlot('chart', [trace], layout, config);
            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.getElementById('chart').innerHTML = '<p style="text-align: center; padding: 50px; color: #666;">Error loading chart data</p>';
            });
    </script>
</body>
</html>
