            padding: 0 2rem;

            margin: 0 auto;

        }
        
        .chart-container.full-width {

        }
        
        .footer {
            text-align: center;
            padding: 2rem;
            color: #7a8a9a;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
