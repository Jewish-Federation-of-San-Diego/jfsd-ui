name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate data schemas
        run: |
          if [ -f scripts/validate-data.ts ]; then
            npx tsx scripts/validate-data.ts
          else
            echo "No validation script yet — skipping"
          fi

      - run: npm run build

      - name: Copy data to dist
        run: |
          mkdir -p dist/data
          cp -r public/data/*.json dist/data/ 2>/dev/null || true

      - name: Copy standalone pages
        run: |
          # Copy any standalone HTML files that exist in public/
          cp public/*.html dist/ 2>/dev/null || true
          # Copy admin pages
          cp -r public/admin dist/admin 2>/dev/null || true
          # Copy charts
          cp -r public/charts dist/charts 2>/dev/null || true
          # Copy assets (brand files etc)
          cp -r public/assets dist/assets 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
