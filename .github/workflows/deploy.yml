name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate data schemas
        run: npm run validate

      - run: npm run build

      - name: Prepare deploy
        run: |
          mkdir -p dist/data
          cp -r public/data/*.json dist/data/ 2>/dev/null || true
          cp public/*.html dist/ 2>/dev/null || true
          cp -r public/charts dist/charts 2>/dev/null || true
          cp -r public/admin dist/admin 2>/dev/null || true
          cp -r public/assets dist/assets 2>/dev/null || true
          touch dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: false
